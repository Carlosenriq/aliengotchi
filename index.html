<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aliengotchi - Inazuma Eleven</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <!-- PANTALLA DE ADOPCIÓN -->
      <div id="adoptionScreen" class="screen active">
        <div class="retro-console">
          <h1 class="glitch">ALIENGOTCHI</h1>
          <div class="pixel-alien">👾</div>
          <p class="instruction">¡Adopta tu nuevo amigo alienígena!</p>
          <form id="adoptionForm">
            <input
              type="text"
              id="alienName"
              placeholder="Nombre de tu alien"
              maxlength="12"
              required
            />
            <button type="submit" class="retro-btn">ADOPTAR</button>
          </form>
        </div>
      </div>

      <!-- PANTALLA PRINCIPAL DEL JUEGO -->
      <div id="gameScreen" class="screen">
        <div class="retro-console">
          <div class="game-header">
            <div class="monedas-box">
              <span>🪙</span>
              <span id="monedasCount">0</span>
            </div>
            <button id="abrirSelectorBtn" class="retro-btn small">
              CAMBIAR ALIEN
            </button>
          </div>

          <div class="alien-display">
            <div id="alienImage" class="pixel-alien">👾</div>
            <h2 id="alienNameDisplay">Alien</h2>
          </div>

          <div class="stats-container">
            <div class="stat">
              <label>🍔 HAMBRE</label>
              <progress id="hambreBar" value="70" max="100"></progress>
              <span id="hambrePercent">70%</span>
            </div>
            <div class="stat">
              <label>⚡ ENERGÍA</label>
              <progress id="energiaBar" value="70" max="100"></progress>
              <span id="energiaPercent">70%</span>
            </div>
            <div class="stat">
              <label>😊 FELICIDAD</label>
              <progress id="felicidadBar" value="70" max="100"></progress>
              <span id="felicidadPercent">70%</span>
            </div>
          </div>

          <div class="buttons-container">
            <button class="action-btn" id="alimentarBtn">🍕 ALIMENTAR</button>
            <button class="action-btn" id="jugarBtn">🎮 JUGAR</button>
            <button class="action-btn" id="dormirBtn">😴 DORMIR</button>
          </div>
        </div>
      </div>

      <!-- PANTALLA DE GAME OVER -->
      <div id="gameOverScreen" class="screen">
        <div class="retro-console">
          <h1 class="glitch">GAME OVER</h1>
          <div class="pixel-alien">💀👾💀</div>
          <p id="gameOverMessage">Tu Aliengotchi ha muerto...</p>
          <button id="restartBtn" class="retro-btn">REINICIAR</button>
        </div>
      </div>
    </div>

    <!-- MODAL SELECTOR DE PERSONAJES -->
    <div id="selectorModal" class="modal" style="display: none">
      <div class="modal-content">
        <h2 class="glitch">SELECCIONA TU ALIEN</h2>
        <div id="personajesLista" class="personajes-grid"></div>
        <button id="cerrarSelectorBtn" class="retro-btn">CERRAR</button>
      </div>
    </div>

    <!-- MODAL MINIJUEGO PENALTIS -->
    <div id="penalModal" class="modal" style="display: none">
      <div class="modal-content">
        <h2 class="glitch">¡LANZA UN PENAL!</h2>
        <div class="campo-penal">
          <div class="porteria">
            <div class="portero" id="portero">🧤</div>
          </div>
          <div class="opciones">
            <button class="penal-btn" data-direccion="izquierda">
              ⬅️ IZQUIERDA
            </button>
            <button class="penal-btn" data-direccion="centro">⬆️ CENTRO</button>
            <button class="penal-btn" data-direccion="derecha">
              ➡️ DERECHA
            </button>
          </div>
          <div id="resultadoPenal" class="resultado-penal"></div>
        </div>
        <button id="cerrarPenalBtn" class="retro-btn">CERRAR</button>
      </div>
    </div>

    <!-- MODAL MINIJUEGO COMIDA CAYENDO -->
    <div id="comidaModal" class="modal" style="display: none">
      <div class="modal-content" style="width: 700px; max-width: 95%">
        <h2 class="glitch">🍔 ¡ATRAPA LA COMIDA! 🍕</h2>
        <div class="comida-game-container">
          <canvas
            id="gameCanvas"
            width="600"
            height="400"
            style="border: 2px solid #00ff9d; background: #0a0e1a"
          ></canvas>
          <div class="comida-stats">
            <p>
              🪙 <span id="comidaMonedasGanadas">0</span> &nbsp;| 🍔
              <span id="comidaHambreGanada">0</span> &nbsp;| ⏱️
              <span id="comidaTiempo">15</span>s
            </p>
          </div>
        </div>
        <button id="cerrarComidaBtn" class="retro-btn">CERRAR</button>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
